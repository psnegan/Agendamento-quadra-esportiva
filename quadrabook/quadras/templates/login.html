{% extends 'base.html' %}
{% block title %}Login — QuadraBook{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <a href="{{ url_for('index') }}" class="brand"><span class="brand-icon">⬡</span> QuadraBook</a>
      <h2>Entrar</h2>
      <p>Acesse sua conta para reservar quadras</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary btn-block">Entrar →</button>
    </form>
    <div class="auth-footer">
      Não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se</a>
    </div>
    <div class="auth-hint">
      <small>Admin: admin@quadras.com / admin123</small>
    </div>
  </div>
</div>
{% endblock %}
