{% extends 'base.html' %}
{% block title %}Cadastro — QuadraBook{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <a href="{{ url_for('index') }}" class="brand"><span class="brand-icon">⬡</span> QuadraBook</a>
      <h2>Criar conta</h2>
      <p>Rápido, gratuito e sem burocracia</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" name="nome" placeholder="Seu nome" required>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="form-group">
        <label>Confirmar senha</label>
        <input type="password" name="confirmar_senha" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary btn-block">Criar conta →</button>
    </form>
    <div class="auth-footer">
      Já tem conta? <a href="{{ url_for('login') }}">Entrar</a>
    </div>
  </div>
</div>
{% endblock %}
